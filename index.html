<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список покупок</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 400px;
            margin: 30px auto;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        li {
            margin-bottom: 5px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Мой список покупок</h1>
    <div class="input-group">
        <label>
            Товар:
            <input type="text" id="itemName" placeholder="Название">
        </label>
        <label>
            Количество:
            <input type="number" id="itemQty" value="1" min="1">
        </label>
        <button id="addBtn">Добавить</button>
    </div>

    <ul id="shoppingList"></ul>
    <button id="clearBtn">Очистить список</button>

    <script src="app.js"></script>
</body>
</html>
